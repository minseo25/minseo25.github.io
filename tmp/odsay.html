<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODSay API Example</title>
</head>
<body>
    <h1>ODSay API Example</h1>
    <form id="input-form">
        <label for="sx">Start X (Longitude): </label>
        <input type="text" id="sx" name="sx"><br>
        <label for="sy">Start Y (Latitude): </label>
        <input type="text" id="sy" name="sy"><br>
        <label for="ex">End X (Longitude): </label>
        <input type="text" id="ex" name="ex"><br>
        <label for="ey">End Y (Latitude): </label>
        <input type="text" id="ey" name="ey"><br>
        <label for="api">API KEY: </label>
        <input type="text" id="api" name="api"><br>
        <button type="button" id="fetch-data">Fetch Data</button>
    </form>
    <pre id="output"></pre>

    <script>
        document.getElementById('fetch-data').addEventListener('click', function() {
            const sx = document.getElementById('sx').value;
            const sy = document.getElementById('sy').value;
            const ex = document.getElementById('ex').value;
            const ey = document.getElementById('ey').value;
            const api = document.getElementById('api').value;

            const url = `https://api.odsay.com/v1/api/searchPubTransPathT?SX=${sx}&SY=${sy}&EX=${ex}&EY=${ey}&apiKey=${api}`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    console.log(data);
                    document.getElementById('output').textContent = JSON.stringify(data, null, 2);
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    document.getElementById('output').textContent = 'Error fetching data';
                });
        });
    </script>
</body>
</html>
